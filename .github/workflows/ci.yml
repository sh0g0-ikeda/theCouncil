name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r backend/requirements.txt

      - name: Python compile check
        run: python -m py_compile backend/main.py backend/auth.py backend/environment.py backend/realtime.py backend/policies.py backend/rate_limit.py backend/api/*.py backend/db/*.py backend/engine/*.py backend/models/*.py scripts/run_backend_checks.py

      - name: Backend checks
        run: python scripts/run_backend_checks.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXTAUTH_SECRET: ci-secret
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      EMAIL_SERVER: smtp://localhost:1025
      EMAIL_FROM: ci@example.com
      TWITTER_CLIENT_ID: test
      TWITTER_CLIENT_SECRET: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Build frontend
        run: npm run build
